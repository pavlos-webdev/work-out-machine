```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lift — Workout Tracker</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#f2f2f7;
  --surface:#fff;
  --text:#000;
  --muted:#8e8e93;
  --blue:#007aff;
  --green:#34c759;
  --red:#ff3b30;
  --border:rgba(60,60,67,.12);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
}

.nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(20px);
  padding:24px 20px 12px;
  border-bottom:1px solid var(--border);
  z-index:10;
}

.nav-title{
  font-size:28px;
  font-weight:700;
}

.nav-subtitle{
  font-size:13px;
  color:var(--muted);
}

.tabs{
  display:flex;
  gap:8px;
  padding:12px 16px;
}

.tab-btn{
  flex:1;
  border:none;
  background:#e9e9ee;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.tab-btn.active{
  background:var(--blue);
  color:#fff;
}

.screen{
  display:none;
  padding:16px;
}

.screen.active{
  display:block;
}

.btn-primary{
  width:100%;
  border:none;
  background:var(--blue);
  color:#fff;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.btn-secondary{
  border:none;
  background:#e8f2ff;
  color:var(--blue);
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn-danger{
  border:none;
  background:rgba(255,59,48,.1);
  color:var(--red);
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:var(--surface);
  border-radius:16px;
  padding:16px;
  margin-top:14px;
}

.exercise-block{
  background:var(--surface);
  border-radius:16px;
  margin-bottom:14px;
  overflow:hidden;
}

.exercise-header{
  display:flex;
  gap:10px;
  padding:14px;
  border-bottom:1px solid var(--border);
}

.exercise-name-input{
  flex:1;
  border:none;
  font-size:16px;
  font-weight:600;
  outline:none;
}

.set-row{
  display:grid;
  grid-template-columns:40px 1fr 1fr 1fr 40px;
  gap:8px;
  padding:10px 14px;
  align-items:center;
}

.set-number{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#e8f2ff;
  color:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
}

input,
select{
  width:100%;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px;
  background:#f7f7fa;
}

.remove-set-btn{
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  color:var(--muted);
}

.add-set-row{
  padding:0 14px 14px;
}

.add-set-btn{
  border:none;
  background:none;
  color:var(--blue);
  font-weight:600;
  cursor:pointer;
}

.timer{
  margin:14px 0;
  color:var(--green);
  font-weight:700;
}

.history-card{
  background:var(--surface);
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

.empty{
  text-align:center;
  padding:40px 20px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-title">Lift</div>
  <div class="nav-subtitle" id="nav-sub">
    Track your training
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="log">Log Workout</button>
  <button class="tab-btn" data-tab="history">History</button>
  <button class="tab-btn" data-tab="stats">Progress</button>
</div>

<!-- LOG -->
<div class="screen active" id="screen-log">

  <div id="log-idle">
    <button class="btn-primary" id="start-workout-btn">
      + Start Workout
    </button>

    <div class="card">
      Quick start templates available after starting.
    </div>
  </div>

  <div id="log-active" style="display:none;">

    <input
      type="text"
      id="workout-name"
      placeholder="Workout Name"
      style="
        width:100%;
        font-size:22px;
        font-weight:700;
        padding:12px 0;
        border:none;
        border-bottom:2px solid var(--border);
        background:transparent;
        margin-bottom:16px;
        outline:none;
      "
    />

    <div class="timer" id="timer-display">
      0:00
    </div>

    <div id="exercises-container"></div>

    <button
      class="btn-secondary"
      id="add-exercise-btn"
      style="width:100%; margin-bottom:14px;"
    >
      + Add Exercise
    </button>

    <div style="display:flex; gap:10px;">
      <button
        class="btn-danger"
        id="cancel-btn"
        style="flex:1;"
      >
        Cancel
      </button>

      <button
        class="btn-primary"
        id="finish-btn"
        style="flex:2;"
      >
        Finish Workout
      </button>
    </div>

  </div>

</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div id="history-list"></div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="card">
    <div>Total Workouts: <strong id="stat-total">0</strong></div>
    <br>
    <div>Total Sets: <strong id="stat-sets">0</strong></div>
  </div>
</div>

<script>
/* SAFE LOCALSTORAGE LOAD */
let workouts = [];

try{
  workouts = JSON.parse(
    localStorage.getItem('lift_workouts') || '[]'
  );

  if(!Array.isArray(workouts)){
    workouts = [];
  }

}catch(err){
  console.error('Corrupt localStorage:', err);
  localStorage.removeItem('lift_workouts');
  workouts = [];
}

/* STATE */
let timerInterval = null;
let timerStart = null;
let exerciseCounter = 0;
const setCounters = {};

/* TABS */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;

    document
      .querySelectorAll('.tab-btn')
      .forEach(b => b.classList.remove('active'));

    document
      .querySelectorAll('.screen')
      .forEach(s => s.classList.remove('active'));

    btn.classList.add('active');

    document
      .getElementById('screen-' + tab)
      .classList.add('active');

    if(tab === 'history'){
      renderHistory();
    }

    if(tab === 'stats'){
      renderStats();
    }
  });
});

/* START WORKOUT */
document
  .getElementById('start-workout-btn')
  .addEventListener('click', startWorkout);

function startWorkout(){

  document.getElementById('log-idle').style.display = 'none';
  document.getElementById('log-active').style.display = 'block';

  document.getElementById('workout-name').value =
    'Workout';

  document.getElementById('nav-sub').textContent =
    'Workout in progress';

  document.getElementById('exercises-container').innerHTML = '';

  timerStart = Date.now();

  clearInterval(timerInterval);

  timerInterval = setInterval(updateTimer, 1000);

  addExercise();
}

/* TIMER */
function updateTimer(){

  const elapsed = Math.floor(
    (Date.now() - timerStart) / 1000
  );

  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;

  document.getElementById('timer-display').textContent =
    `${m}:${String(s).padStart(2, '0')}`;
}

/* ADD EXERCISE */
document
  .getElementById('add-exercise-btn')
  .addEventListener('click', addExercise);

function addExercise(){

  const id = 'exercise-' + exerciseCounter++;

  const div = document.createElement('div');

  div.className = 'exercise-block';

  div.innerHTML = `
    <div class="exercise-header">
      <input
        type="text"
        class="exercise-name-input"
        placeholder="Exercise name"
      >

      <button
        class="btn-danger remove-exercise-btn"
      >
        ✕
      </button>
    </div>

    <div class="sets-container"></div>

    <div class="add-set-row">
      <button class="add-set-btn">
        + Add Set
      </button>
    </div>
  `;

  document
    .getElementById('exercises-container')
    .appendChild(div);

  setCounters[id] = 0;

  const setsContainer =
    div.querySelector('.sets-container');

  const addSetBtn =
    div.querySelector('.add-set-btn');

  addSetBtn.addEventListener('click', () => {
    addSet(id, setsContainer);
  });

  div
    .querySelector('.remove-exercise-btn')
    .addEventListener('click', () => {
      div.remove();
    });

  addSet(id, setsContainer);
}

/* ADD SET */
function addSet(exerciseId, container){

  setCounters[exerciseId]++;

  const setNum = setCounters[exerciseId];

  const row = document.createElement('div');

  row.className = 'set-row';

  row.innerHTML = `
    <div class="set-number">${setNum}</div>

    <input
      type="number"
      placeholder="Reps"
    >

    <input
      type="number"
      placeholder="Weight"
    >

    <select>
      <option>lbs</option>
      <option>kg</option>
    </select>

    <button class="remove-set-btn">
      −
    </button>
  `;

  container.appendChild(row);

  row
    .querySelector('.remove-set-btn')
    .addEventListener('click', () => {
      row.remove();
      renumberSets(container);
    });
}

/* FIXED RENUMBERING */
function renumberSets(container){

  const rows =
    container.querySelectorAll('.set-row');

  rows.forEach((row, index) => {
    row.querySelector('.set-number').textContent =
      index + 1;
  });
}

/* FINISH */
document
  .getElementById('finish-btn')
  .addEventListener('click', finishWorkout);

function finishWorkout(){

  const exercises = [];

  document
    .querySelectorAll('.exercise-block')
    .forEach(block => {

      const name =
        block.querySelector('.exercise-name-input')
        .value || 'Exercise';

      const sets = [];

      block
        .querySelectorAll('.set-row')
        .forEach(row => {

          const inputs =
            row.querySelectorAll('input');

          const reps = inputs[0].value || 0;
          const weight = inputs[1].value || 0;
          const unit =
            row.querySelector('select').value;

          sets.push({
            reps,
            weight,
            unit
          });
        });

      exercises.push({
        name,
        sets
      });
    });

  workouts.unshift({
    id:Date.now(),
    date:new Date().toISOString(),
    name:
      document.getElementById('workout-name')
      .value || 'Workout',
    exercises
  });

  localStorage.setItem(
    'lift_workouts',
    JSON.stringify(workouts)
  );

  clearInterval(timerInterval);

  document.getElementById('log-idle').style.display =
    'block';

  document.getElementById('log-active').style.display =
    'none';

  document.getElementById('nav-sub').textContent =
    'Track your training';

  renderHistory();
  renderStats();

  alert('Workout saved.');
}

/* CANCEL */
document
  .getElementById('cancel-btn')
  .addEventListener('click', () => {

    clearInterval(timerInterval);

    document.getElementById('log-idle').style.display =
      'block';

    document.getElementById('log-active').style.display =
      'none';

    document.getElementById('nav-sub').textContent =
      'Track your training';
  });

/* HISTORY */
function renderHistory(){

  const container =
    document.getElementById('history-list');

  if(workouts.length === 0){

    container.innerHTML = `
      <div class="empty">
        No workouts yet
      </div>
    `;

    return;
  }

  container.innerHTML = workouts.map(w => {

    const totalSets =
      w.exercises.reduce(
        (a,e) => a + e.sets.length,
        0
      );

    return `
      <div class="history-card">
        <strong>${w.name}</strong>
        <br><br>

        ${w.exercises.length} exercises
        ·
        ${totalSets} sets
      </div>
    `;
  }).join('');
}

/* STATS */
function renderStats(){

  document.getElementById('stat-total').textContent =
    workouts.length;

  const totalSets =
    workouts.reduce(
      (a,w) =>
        a +
        w.exercises.reduce(
          (b,e) => b + e.sets.length,
          0
        ),
      0
    );

  document.getElementById('stat-sets').textContent =
    totalSets;
}

/* INITIAL RENDER */
renderHistory();
renderStats();
</script>

</body>
</html>
```
