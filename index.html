<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lift Workout Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="nav">
    <div class="nav-title">Lift</div>
    <div class="nav-subtitle" id="nav-sub">Track your training</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('templates')">Templates</button>
    <button class="tab-btn" onclick="switchTab('history')">History</button>
    <button class="tab-btn" onclick="switchTab('stats')">Progress</button>
  </div>

  <!-- Active workout banner (shown across all tabs when workout is running) -->
  <div id="active-workout-banner" style="display:none;">
    <div class="banner-inner">
      <div class="banner-left">
        <div class="timer-dot"></div>
        <span id="banner-timer">0:00</span>
        <span id="banner-name" class="banner-name"></span>
      </div>
      <button class="banner-btn" onclick="switchTab('log')">Resume →</button>
    </div>
  </div>

  <!-- Hidden log screen (active workout UI) -->
  <div class="screen" id="screen-log">
    <div style="margin-bottom:16px;">
      <input type="text" class="workout-name-input" id="workout-name" placeholder="Workout Name" style="width:100%;" />
    </div>

    <div class="timer-pill">
      <div class="timer-dot"></div>
      <span id="timer-display">0:00</span>
    </div>

    <div id="exercises-container"></div>

    <button class="btn-secondary" onclick="addExercise()" style="width:100%; padding:12px; font-size:15px; margin-bottom:12px;">
      + Add Exercise
    </button>

    <button class="btn-secondary" onclick="saveCurrentAsTemplate()" style="width:100%; padding:12px; font-size:15px; margin-bottom:12px;">
      💾 Save as Template
    </button>

    <div style="display:flex;gap:10px;">
      <button onclick="cancelWorkout()" class="btn-cancel">
        Cancel
      </button>
      <button onclick="finishWorkout()" class="btn-finish">
        Finish Workout ✓
      </button>
    </div>
  </div>

  <!-- Templates screen -->
  <div class="screen active" id="screen-templates">
    <div style="padding:8px 0 16px;">
      <button class="btn-primary" onclick="startWorkout()" style="font-size:17px;padding:16px;">
        + Start Empty Workout
      </button>
    </div>

    <div class="section-header">Quick Start</div>
    <div class="card">
      <div style="padding:4px 0;">
        <div onclick="startFromTemplate('Push Day')" class="template-row">
          <div>
            <div class="template-row-title">Push Day</div>
            <div class="template-row-sub">Chest · Shoulders · Triceps</div>
          </div>
          <span class="chevron">›</span>
        </div>
        <div onclick="startFromTemplate('Pull Day')" class="template-row">
          <div>
            <div class="template-row-title">Pull Day</div>
            <div class="template-row-sub">Back · Biceps · Rear Delts</div>
          </div>
          <span class="chevron">›</span>
        </div>
        <div onclick="startFromTemplate('Leg Day')" class="template-row template-row-last">
          <div>
            <div class="template-row-title">Leg Day</div>
            <div class="template-row-sub">Quads · Hamstrings · Glutes</div>
          </div>
          <span class="chevron">›</span>
        </div>
      </div>
    </div>

    <div class="section-header">My Templates</div>
    <div id="saved-templates"></div>
  </div>

  <!-- History screen -->
  <div class="screen" id="screen-history">
    <div id="history-list"></div>
  </div>

  <!-- Stats screen -->
  <div class="screen" id="screen-stats">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Workouts</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-value" id="stat-sets">0</div>
        <div class="stat-label">Total Sets</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-value" id="stat-volume">0</div>
        <div class="stat-label">Total Volume</div>
      </div>
    </div>

    <div class="section-header" style="margin-top:16px;">Exercise Frequency</div>
    <div id="exercise-freq" class="card card-body"></div>
  </div>

  <!-- Exercise picker modal -->
  <div class="modal-overlay" id="exercise-modal" onclick="closeModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div style="font-size:18px; font-weight:700; margin-bottom:14px; letter-spacing:-0.3px;">Choose Exercise</div>
      <input type="text" placeholder="Search exercises…" id="exercise-search" oninput="filterExercises()" style="margin-bottom:12px;" />
      <div id="exercise-list" style="max-height:360px; overflow-y:auto;"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
