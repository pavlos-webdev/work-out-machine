<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lift Workout Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="nav">
    <h1>Lift</h1>
    <p id="subtitle">Track your workouts</p>
  </header>

  <main>

    <section class="card">
      <button id="startBtn" class="primary-btn">
        Start Workout
      </button>
    </section>

    <section id="workoutSection" class="hidden">

      <div class="card">
        <input
          id="workoutName"
          type="text"
          placeholder="Workout name"
        />

        <div id="timer">0:00</div>
      </div>

      <div id="exerciseContainer"></div>

      <button id="addExerciseBtn" class="secondary-btn">
        + Add Exercise
      </button>

      <div class="actions">
        <button id="cancelBtn" class="danger-btn">
          Cancel
        </button>

        <button id="finishBtn" class="primary-btn">
          Finish Workout
        </button>
      </div>

    </section>

<section class="card">
  <h2>Saved Workouts</h2>
  <div id="templates"></div>
</section>

    <section class="card">
      <h2>History</h2>
      <div id="history"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
